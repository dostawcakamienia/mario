<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>index2 - Wybór gry</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:linear-gradient(135deg,#111827,#1f2937);
            color:white;
        }

        .menu{
            text-align:center;
        }

        h1{
            margin-bottom:40px;
            font-size:48px;
        }

        .buttons{
            display:flex;
            gap:30px;
            justify-content:center;
        }

        .game-btn{
            width:220px;
            height:120px;
            border:none;
            border-radius:15px;
            font-size:28px;
            font-weight:bold;
            cursor:pointer;
            color:white;
            transition:.3s;
        }

        .mines{
            background:#22c55e;
        }

        .blackjack{
            background:#e11d48;
        }

        .game-btn:hover{
            transform:scale(1.08);
        }

        a{
            text-decoration:none;
        }
    </style>
</head>
<body>

<div class="menu">
    <h1>🎮 Wybierz grę</h1>

    <div class="buttons">
        <a href="index3.html">
            <button class="game-btn mines">💣 Mines</button>
        </a>

        <a href="index4.html">
            <button class="game-btn blackjack">🂡 Blackjack</button>
        </a>
    </div>
</div>

</body>
</html>
